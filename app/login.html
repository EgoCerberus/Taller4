<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none text-dark fs-3 fw-bold"><i class="bi bi-controller me-2 text-primary"></i>CyberTech</a>
                            <p class="text-muted mt-2">Inicia sesión en tu cuenta</p>
                        </div>
                        <form>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingInput" placeholder="nombre@ejemplo.com" required>
                                <label for="floatingInput">Correo Electrónico</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña" required>
                                <label for="floatingPassword">Contraseña</label>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberCheck">
                                    <label class="form-check-label" for="rememberCheck">Recordarme</label>
                                </div>
                                <a href="recuperar.html" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 text-white py-2 mb-3">Ingresar</button>
                            <a href="registro.html" class="btn btn-outline-secondary w-100 py-2">Crear cuenta nueva</a>
                        </form>
