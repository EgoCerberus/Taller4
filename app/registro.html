<body class="bg-light d-flex align-items-center justify-content-center py-5 min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none text-dark fs-2 fw-bold"><i class="bi bi-controller me-2 text-primary"></i>CyberTech</a>
                            <p class="text-muted">Completa el formulario para unirte a nuestra plataforma</p>
                        </div>
                        <form class="row g-3">
                            <div class="col-md-6">
                                <label for="nombres" class="form-label">Nombres</label>
                                <input type="text" class="form-control" id="nombres" placeholder="Ej. Juan Carlos" required>
                            </div>
                            <div class="col-md-6">
                                <label for="apellidos" class="form-label">Apellidos</label>
                                <input type="text" class="form-control" id="apellidos" placeholder="Ej. Pérez Gómez" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="juan@ejemplo.com" required>
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Teléfono / Celular</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="300 000 0000" required>
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="col-md-6">
                                <label for="passwordConfirm" class="form-label">Confirmar Contraseña</label>
                                <input type="password" class="form-control" id="passwordConfirm" required>
                            </div>
                            <div class="col-12 mt-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="terms" required>
                                    <label class="form-check-label" for="terms">
                                        Acepto los términos y condiciones de uso y privacidad.
                                    </label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 text-white py-2 fw-bold">Registrarse</button>
                            </div>
                            <div class="col-12 text-center mt-3">
                                <span class="text-muted">¿Ya tienes cuenta? </span><a href="login.html" class="text-decoration-none">Iniciar sesión</a>
                            </div>
                        </form>
                    </div>
                </div>
